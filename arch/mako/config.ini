sort=-time
layer=overlay
width=300
height=410
border-size=1
border-radius=5
icons=0
max-icon-size=64
default-timeout=5000
ignore-timeout=1
font=Iosevka 10
on-notify=exec mpv $HOME/.config/mako/sounds/classy.mp3

[urgency=low]
border-color=#C6CDD2

[urgency=normal]
border-color=#64848A

[urgency=high]
border-color=#BF616A
default-timeout=0

[category=mpd]
default-timeout=2000
group-by=category

# Дневной режим
[mode=light]
background-color=#C6CDD2BB
text-color=#223441
border-color=#223441BB
#progress-color=over #4C7899FF

# Ночной режим
[mode=dark]
background-color=#223441
text-color=#C6CDD2
border-color=#223441FF
#progress-color=over #5588AAFF

# Настройки по умолчанию
#[default]
#mode=light