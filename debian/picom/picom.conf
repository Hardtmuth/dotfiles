# Закруглённые углы
#corner-radius = 10;
#rounded-corners = true;
#round-borders = 1;

# Тени
shadow = false;
shadow-radius = 8;
shadow-opacity = 0.6;
shadow-offset-x = -3;
shadow-offset-y = -3;
shadow-exclude = [
    "class_g ?= 'i3-frame'"
];

# Плавность
fading = false;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# Прозрачность
inactive-opacity = 1;
frame-opacity = 0.5;
inactive-opacity-override = false;
detect-client-opacity = true;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
opacity-rule = [
    "90:class_g = 'URxvt'",
    "80:class_g = 'kitty'",
    "97:class_g = 'Anki'",
    "70:class_g = 'i3bar'"
];
#inactive-dim = 0.25
#inactive-opacity-override = true;

# Общие настройки
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";

# Типы окон
wintypes = {
    tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1; };
    dropdown_menu = { opacity = 1; };
};
