click-right = ~/.config/polybar/scripts/disconnect_wireguard.sh

[module/updates]
type = custom/script
interval = 100
exec = ~/.config/polybar/scripts/updates.sh
click-left = kitty --hold sudo apt update

[module/mail]
type = custom/script
exec = ~/.config/polybar/scripts/mail.py
interval = 30
label = ÔÉ† %output%
click-left = exec evolution &

[module/mail-work]
type = custom/script
exec = ~/.config/polybar/scripts/mail-work.py
interval = 30
label = ůįäę %output%
click-left = exec evolution &

[module/docker]
