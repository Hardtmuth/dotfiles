[colors]
#background = #1E2931aa
background = #182a35
background-alt = #1b2932
#foreground = #C6CDD2
foreground = #C6CDD2
primary = #C6CDD2
#primary = #F0C674
secondary = #8ABEB7
alert = #A54242
#disabled = #707880
disabled = #C6CDD2

[bar/top]
width = 100%
height = 20pt
radius = 0
monitor = ${env:MONITOR:}

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = Iosevka NF:size=11;2
font-1 = "Font Awesome 6 Free:style=Solid;2"
font-2 = "Weather Icons:size=12;1"

modules-left = logo menu i3 xwindow
#modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date active-network  xworkspaces menu-apps
modules-right =  pomo weather usb updates mail mail-work bluetooth clip xkeyboard pulseaudio battery date
#modules-center =  

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[bar/bottom]
width = 100%
height = 20pt
#offset-y = -20  
radius = 0
monitor = ${env:MONITOR:}
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = Iosevka NF:size=11;2
font-1 = "Font Awesome 6 Free:style=Solid;2"

modules-left = wireguard wlan eth publicip docker smb
modules-right = cpu temperature fs-home-icon fs-home-bar fs-home-text memory-icon memory-bar memory-text services
#modules-center = date 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/xwindow]
type = internal/xwindow
#label = %title:0:60:...%
label = %title:0:150:...%
label-empty = Ó≠Ņ  Desktop

[fs-base]
type = internal/fs
interval = 25
mount-0 = /
#label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%


[module/fs-home-icon]
inherit = fs-base
format-mounted = <label-mounted>
label-mounted = ůįčä  %fsname%

[module/fs-home-bar]
inherit = fs-base
format-mounted = <bar-free>
bar-free-width = 8
bar-free-empty = ‚ĖĎ
bar-free-fill =  ‚Ėď
bar-free-indicator = ‚Ėď
bar-free-fill-foreground = #3d818f
bar-free-indicator-foreground = #3d818f


[module/fs-home-text]
inherit = fs-base
#label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
format-mounted = <label-mounted>
label-mounted = %free% %{F#3d818f} / %total%%{F-}

#label-unmounted = %mountpoint% not mounted
#label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

#format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

label-muted = ůįĚü muted
label-muted-foreground = ${colors.disabled}
click-right = kitty -e pulsemixer

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout>
format-spacing = 4
layout-icon-0 = us;ÓĻÜ  US
layout-icon-1 = ru;ÓĹč  RU
label-layout = %icon%


[memory-base]
type = internal/memory
interval = 2
#label = ÓŅÖ  %used% %percentage_used:2%%
click-left = kitty --hold btop

[module/memory-icon]
inherit = memory-base
label = ÓŅÖ  %percentage_used:2%%
click-left = kitty --hold btop


[module/memory-bar]
inherit = memory-base
format = <bar-used>
bar-used-width = 8
bar-used-empty = ‚ĖĎ
bar-used-fill = ‚Ėď
bar-used-indicator = ‚Ėď
bar-used-fill-foreground = #3d818f
bar-used-indicator-foreground = #3d818f
click-left = kitty --hold btop


[module/memory-text]
inherit = memory-base
label = %used% %{F#3d818f} / %total%%{F-}
click-left = kitty --hold btop

[module/cpu]
type = internal/cpu
interval = 2
#format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = Ôíľ  %percentage%%

#[module/active-network]
#type = custom/script
#exec = ~/.config/polybar/scripts/active_interface.sh
#tail = true
#interval = 5
#format = <label>
#label = %output%
