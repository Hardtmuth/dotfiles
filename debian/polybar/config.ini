format-connected = <label-connected>
format-disconnected = <label-disconnected>
click-left = kitty -e nmtui
label-disconnected = 
#label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
#label-connected = %{F#F0C674}%ifname%%{F-}  %local_ip%
label-connected = ůįąÄ  %ifname%: %local_ip% %{F#3d818f}Ôáę  %essid%%{F-}

[module/eth]
inherit = network-base
interface-type = wired
#label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
label-connected = ůįąÄ  %ifname%: %local_ip%

[module/date]
type = internal/date
interval = 1

date-alt = %H:%M
date = Ó™į  %a %d %b %H:%M

label = %date%
#label-foreground = ${colors.primary}
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth-module.sh
interval = 5

; –ě–Ī—Ä–į–Ī–ĺ—ā—á–ł–ļ–ł –ļ–Ľ–ł–ļ–ĺ–≤
click-left = kitty -e bluetoothctl
click-middle = ~/.config/polybar/scripts/toggle-bluetooth.sh
click-right = kitty -e cat ~/.config/polybar/cheatsheets/bluetoothctl.md
; –°—ā–ł–Ľ–ł–∑–į—Ü–ł—Ź (–Ĺ–į—Ā—ā—Ä–ĺ–Ļ—ā–Ķ –Ņ–ĺ–ī —Ā–≤–ĺ—é —ā–Ķ–ľ—É)
format = <label>
label = %output%
#format-foreground = #88c0d0  ; —Ü–≤–Ķ—ā —ā–Ķ–ļ—Ā—ā–į
#format-background = #2e3440  ; —Ą–ĺ–Ĺ
#format-padding = 4

[module/clip]
type = custom/text
click-left = ~/.config/i3/scripts/clipboard.sh
format = <label>
label = ÓĶĽ

[module/menu]
type = custom/text
click-left = ~/.config/rofi/launchers/type-1/launcher.sh
format = <label>
label =Think and keep it simple

[module/logo]
type = custom/text
click-left = ~/.config/rofi/powermenu/type-1/powermenu.sh
format = <label>
label = ÓĚĹ

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = AC
poll-interval = 5
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity>  <label-discharging>
format-low = <label-low> <animation-low>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔČÄ
label-low = %{F#FF2c2c}ÔČĄ  %percentage%%%{F-}  

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

bar-capacity-width = 10

animation-charging-0 = ÔČĄ ůĪźč
animation-charging-1 = ÔČÉ ůĪźč
animation-charging-2 = ÔČā ůĪźč
animation-charging-3 = ÔČĀ ůĪźč
animation-charging-4 = ÔČÄ ůĪźč
animation-charging-framerate = 750

animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 500

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false

fuzzy-match = true

; ws-icon-[0-9]+ = <label>;<icon>
; NOTE: The <label> needs to match the name of the i3 workspace
; Neither <label> nor <icon> can contain a semicolon (;)
ws-icon-0 = 1;‚ôö
ws-icon-1 = 2;‚ôõ
ws-icon-2 = 3;‚ôú
ws-icon-3 = 4;‚ôĚ
ws-icon-4 = 5;‚ôě
ws-icon-default = ‚ôü
; NOTE: You cannot skip icons, e.g. to get a ws-icon-6
; you must also define a ws-icon-5.
; NOTE: Icon will be available as the %icon% token inside label-*
;https://ya.ru
; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-padding = 1
label-mode-background = #e60053

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-focused = %index%
label-focused-foreground = ${colors.foreground}
label-focused-background = #243742
label-focused-underline = ${colors.foreground}
label-focused-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-unfocused = %index%
label-unfocused-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-visible = %index%
label-visible-underline = #555555
label-visible-padding = 1

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-urgent = %index%
label-urgent-foreground = ${colors.foreground}
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

; Separator in between workspaces
label-separator = 
label-separator-padding = 1
label-separator-foreground = #ffb52a

[module/menu-apps]
type = custom/menu

; If true, <label-toggle> will be to the left of the menu items (default).
; If false, it will be on the right of all the items.
expand-right = true

; "menu-LEVEL-N" has the same properties as "label-NAME" with
; the additional "exec" property
;
; Commands will be executed using "/bin/sh -c $COMMAND"

menu-0-0 = Browsers
menu-0-0-exec = #menu-apps.open.1
menu-0-1 = Multimedia
menu-0-1-exec = #menu-apps.open.2

menu-1-0 = Firefox
menu-1-0-exec = firefox
menu-1-1 = Chromium
menu-1-1-exec = chromium

menu-2-0 = Gimp
menu-2-0-exec = gimp
menu-2-1 = Scrot
menu-2-1-exec = scrot
; Available tags:
;   <label-toggle> (default) - gets replaced with <label-(open|close)>
;   <menu> (default)
; If expand-right is true, the default will be "<label-toggle><menu>" and the
; other way around otherwise.
; Note that if you use <label-toggle> you must also include
; the definition for <label-open>
; format = <label-toggle><menu>

label-open = Apps
label-close = x

; Optional item separator
; Default: none
label-separator = |

[module/temperature]
type = internal/temperature

interval = 1
thermal-zone = 0

zone-type = x86_pkg_temp
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input

base-temperature = 20
warn-temperature = 75

units = true
format = <ramp> <label>
format-warn = <ramp> <label-warn>

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = Ôčá
#ramp-foreground = #55

[module/weather]
type = custom/script
exec = echo "$(curl -4 -sf 'https://wttr.in/?format=1')"
#echo "# $(curl -4 -sf ifconfig.co)"
interval = 600
#label-font = 3

[module/publicip]
type = custom/script
exec = echo "ůįĖü  $(curl -4 -sf ifconfig.co)"
click-left = curl -4 -sf ifconfig.co | xclip -selection clipboard
