$focus = rgba(4cb35eee)
$unfocus = rgba(1E293188)
$gardient = rgba(4cb35ea1)

$terminal = kitty
$browser = chromium
$filemanager = yazi
$text_editor = vscodium
$menu = rofi -show drun

monitor=eDP-1,1920x1080,0x0,1
monitor=DP-2,preferred,-1920x0,1
monitor=HDMI-A-1,preferred,-2560x0,1
monitor=DP-1,preferred,auto-up,1

env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-

exec-once = qs -c noctalia-shell
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --watch cliphist store
exec-once = /home/link/.config/hypr/scripts/output_monitor.py
exec-once = udiskie
exec-once = wl-paste --watch cliphist store

# exec-once=hyprctl setcursor [THEME] [SIZE]

input {
    kb_layout = us, ru
    kb_variant = 
    kb_model =
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus=false
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 8
    gaps_out = 12
    border_size = 1
    col.active_border = $focus
    col.inactive_border = $unfocus
    layout = dwindle
}

decoration {
    rounding = 5
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = on
        ignore_opacity = true
        xray = true
        # blurls = waybar
    }
    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0
}

group {
    col.border_active = $focus
    col.border_inactive = $unfocus
    groupbar {
        col.active = $gardient
        col.inactive = $unfocus
        gradients = true
        indicator_height = 0
        height = 20
        font_size = 12
        font_weight_active = bold
        gradient_rounding = 5
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}


$mainMod = SUPER

# 1. Actions
bind = $mainMod, SPACE, exec, qs -c noctalia-shell ipc call launcher toggle #"App Launcher"
bind = $mainMod SHIFT, Q, exec, qs -c noctalia-shell ipc call sessionMenu toggle #"Session Menu"
bind = ALT, Tab, exec, qs -c noctalia-shell ipc call launcher windows #"Opened Windows List"
bind = $mainMod, TAB, exec, qs -c noctalia-shell ipc call plugin:workspace-overview toggle #"Worspaces Overview"
bind = $mainMod ALT, L, exec, qs -c noctalia-shell ipc call sessionMenu lock #"Lock Screen"
bind = $mainMod, M, exit #"Close Hyprland"
bind = SUPER, V, exec, qs -c noctalia-shell ipc call launcher clipboard #"Clipboard History"
bind = $mainMod ALT, C, exec, hyprpicker -a

# 2. Applications
bind = $mainMod, RETURN, exec, $terminal #"Terminal"
bind = $mainMod, B, exec, $browser #"Browser"
bind = $mainMod, E, exec, $terminal -- $filemanager #"TUI File Manager"
bind = $mainMod SHIFT, E, exec, dolphin #"GUI File Manager"
bind = $mainMod, slash, exec, $text_editor #"Text Editor"

# 3. Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m region #"Screenshot Region"
bind = , PRINT, exec, hyprshot -m output #"Screenshot Screen"
bind = $mainMod, PRINT, exec, hyprshot -m window #"Screenshot Active Window"
env = HYPRSHOT_DIR, /home/link/Pictures/Screenshots


# 3. Windows
bind = $mainMod, Q, killactive #"Kill Active Window"
bind = $mainMod, F, fullscreen #"Fullscreen Window"
bind = $mainMod, T, togglefloating #"Float Window Toggle"
bind = $mainMod, R, layoutmsg, togglesplit #"Toggles the split (top/side)"
# workspace = w[t1], gapsout:200 400
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/toggle_gaps.sh #"Center One Window Toggle"

# 4. Focus
bind = $mainMod, left, movefocus, l #"Move Focus Left"
bind = $mainMod, right, movefocus, r #"Move Focus Right"
bind = $mainMod, up, movefocus, u #"Move Focus Up"
bind = $mainMod, down, movefocus, d #"Move Focus Down"

bind = $mainMod, H, movefocus, l #"Move Focus Left"
bind = $mainMod, L, movefocus, r #"Move Focus Right"
bind = $mainMod, K, movefocus, u #"Move Focus Up"
bind = $mainMod, J, movefocus, d #"Move Focus Down"

# 5. Resize
bind = $mainMod SHIFT, right, resizeactive, 100 0 #"Resize Active Window Right"
bind = $mainMod SHIFT, left, resizeactive, -100 0 #"Resize Active Window Left"
bind = $mainMod SHIFT, up, resizeactive, 0 -100 #"Resize Active Window Up"
bind = $mainMod SHIFT, down, resizeactive, 0 100 #"Resize Active Window Down"

bind = $mainMod SHIFT, L, resizeactive, 100 0 #"Resize Active Window Left"
bind = $mainMod SHIFT, H, resizeactive, -100 0 #"Resize Active Window Right"
bind = $mainMod SHIFT, K, resizeactive, 0 -100 #"Resize Active Window Up"
bind = $mainMod SHIFT, J, resizeactive, 0 100 #"Resize Active Window Down"

bindm = $mainMod, mouse:272, movewindow #"Mouse Move Window"
bindm = $mainMod, mouse:273, resizewindow #"Mouse Resize Window"

# 6. Swap
bind = $mainMod CTRL, right, movewindow, r #"Move Active Window Right"
bind = $mainMod CTRL, left, movewindow, l #"Move Active Window Left"
bind = $mainMod CTRL, up, movewindow, u #"Move Active Window Up"
bind = $mainMod CTRL, down, movewindow, d #"Move Active Window Down"

bind = $mainMod CTRL, L, movewindow, r #"Move Active Window Right"
bind = $mainMod CTRL, H, movewindow, l #"Move Active Window Left"
bind = $mainMod CTRL, K, movewindow, u #"Move Active Window Up"
bind = $mainMod CTRL, J, movewindow, d #"Move Active Window Down"

# 7 .Group
bind = $mainMod, G, togglegroup #"Toggle Window Goup"
bind = $mainMod ALT, left, changegroupactive, b #"Switch Focus Left in Goup"
bind = $mainMod ALT, right, changegroupactive, f #"Switch Focus Right in Goup"

# 8. Workspaces
bind = $mainMod, 1, workspace, 1 #"Go to Worspace 1"
bind = $mainMod, 2, workspace, 2 #"Go to Worspace 2"
bind = $mainMod, 3, workspace, 3 #"Go to Worspace 3"
bind = $mainMod, 4, workspace, 4 #"Go to Worspace 4"
bind = $mainMod, 5, workspace, 5 #"Go to Worspace 5"
bind = $mainMod, 6, workspace, 6 #"Go to Worspace 6"
bind = $mainMod, 7, workspace, 7 #"Go to Worspace 7"
bind = $mainMod, 8, workspace, 8 #"Go to Worspace 8"
bind = $mainMod, 9, workspace, 9 #"Go to Worspace 9"
bind = $mainMod, 0, workspace, 10 #"Go to Worspace 10"
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move Window to Worspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move Window to Worspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move Window to Worspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move Window to Worspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move Window to Worspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #"Move Window to Worspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #"Move Window to Worspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #"Move Window to Worspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #"Move Window to Worspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Move Window to Worspace 10"
bind = $mainMod, mouse_down, workspace, e+1 #"Mouse Switch Worspace +1"
bind = $mainMod, mouse_up, workspace, e-1 #"Mouse Switch Worspace -1"
#bind = $mainMod CTRL, down, workspace, empty

# 9. Multimonitor
bind = $mainMod CTRL, D, exec, hyprctl keyword monitor "eDP-1, disable" #"Disable Notebook Monitor"
bind = $mainMod CTRL, E, exec, hyprctl keyword monitor "eDP-1, enable" #"Enable Notebook Monitor"

bind = $mainMod ALT, D, exec, hyprctl keyword monitor "HDMI-A-1, disable" #"Disable Side Monitor"
bind = $mainMod ALT, E, exec, hyprctl keyword monitor "HDMI-A-1, enable" #"Disable Side Monitor"

bind = $mainMod CTRL, 1, focusworkspaceoncurrentmonitor, 1 #"Move Worspace 1 to Side Monitor"
bind = $mainMod CTRL, 2, focusworkspaceoncurrentmonitor, 2 #"Move Worspace 2 to Side Monitor"
bind = $mainMod CTRL, 3, focusworkspaceoncurrentmonitor, 3 #"Move Worspace 3 to Side Monitor"
bind = $mainMod CTRL, 4, focusworkspaceoncurrentmonitor, 4 #"Move Worspace 4 to Side Monitor"
bind = $mainMod CTRL, 5, focusworkspaceoncurrentmonitor, 5 #"Move Worspace 5 to Side Monitor"
bind = $mainMod CTRL, 6, focusworkspaceoncurrentmonitor, 6 #"Move Worspace 6 to Side Monitor"
bind = $mainMod CTRL, 7, focusworkspaceoncurrentmonitor, 7 #"Move Worspace 7 to Side Monitor"
bind = $mainMod CTRL, 8, focusworkspaceoncurrentmonitor, 8 #"Move Worspace 8 to Side Monitor"
bind = $mainMod CTRL, 9, focusworkspaceoncurrentmonitor, 9 #"Move Worspace 9 to Side Monitor"
bind = $mainMod CTRL, 0, focusworkspaceoncurrentmonitor, 10 #"Move Worspace 10 to Side Monitor"

# 10. Fn keys
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10% #"Increase brightness by 10%"
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%- #"Reduce brightness by 10%""
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% #"Increase volume by 5%"
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% #"Reduce volume by 5%"
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle #"Mute volume"
# bind = , XF86AudioPlay, exec, playerctl play-pause
# bind = , XF86AudioPause, exec, playerctl pausem
# bind = , XF86AudioNext, exec, playerctl next
# bind = , XF86AudioPrev, exec, playerctl previousss
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle #"Toggle Microphone"
# bind = , XF86Calculator, exec, qalculate-gtk
# bind = , XF86Lock, exec, hyprlock
# bind = , XF86Tools, exec, alacritty --class dotfiles-floating -e ~/dotfiles/hypr/settings/settings.sh

gesture = 3, horizontal, workspace

windowrule = match:class chromium, workspace 1
windowrule = match:class ticktick, workspace 2
windowrule = match:class org.mozilla.Thunderbird, workspace 2
windowrule = match:class org.telegram.desktop, workspace 3
windowrule = match:class whatsdesk, workspace 3
windowrule = match:class Bitrix24, workspace 3
windowrule = match:class com.viber.Viber, workspace 3
windowrule = match:class RemoteDesktopManager, workspace 4
windowrule = match:class Anydesk, workspace 5
windowrule = match:class rudesktop, workspace 5
windowrule = match:class rustdesk, workspace 5
windowrule = match:class WinBox, workspace 6
windowrule = match:class virt-manager, workspace 8
windowrule = match:class obsidian, workspace 9
windowrule = match:class codium, workspace 10

windowrule = match:class xdg-desktop-portal-gtk, center on, float on
#windowrule = match:class RemoteDesktopManager, center on, float on
source = /home/link/.config/hypr/noctalia/noctalia-colors.conf
